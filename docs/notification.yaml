paths:
  /api/v1/notification/client:
    get:
      tags: [Notification]
      summary: Get client notifications
      security:
        - BearerAuth: []
      responses:
        200:
          description: Client notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }

  /api/v1/notification/business:
    get:
      tags: [Notification]
      summary: Get business notifications
      security:
        - BearerAuth: []
      responses:
        200:
          description: Business notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }

    post:
      tags: [Notification]
      summary: Create business notification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, message]
              properties:
                subject: { type: string }
                message: { type: string }
                type: { type: string, enum: [EMAIL, SMS, TELEGRAM, PUSH] }
      responses:
        201:
          description: Notification created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Notification' }

  /api/v1/notification/report:
    post:
      tags: [Notification]
      summary: Create report to admins
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                subject: { type: string }
                message: { type: string }
      responses:
        201:
          description: Report created

    get:
      tags: [Notification]
      summary: Get all reports (admin only)
      security:
        - BearerAuth: []
      responses:
        200:
          description: All reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Report' }

  /api/v1/notification/report/mine:
    get:
      tags: [Notification]
      summary: Get my reports
      security:
        - BearerAuth: []
      responses:
        200:
          description: User reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Report' }

  /api/v1/notification/report/{id}:
    delete:
      tags: [Notification]
      summary: Delete report
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        204:
          description: Report deleted

components:
  schemas:
    Notification:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        bookingId: { type: string, nullable: true }
        type: { type: string, enum: [EMAIL, SMS, TELEGRAM, PUSH] }
        status: { type: string, enum: [PENDING, SENT, FAILED] }
        subject: { type: string }
        message: { type: string }
        sentAt: { type: string, format: date-time, nullable: true }
        error: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }

    Report:
      type: object
      properties:
        id: { type: string }
        senderId: { type: string }
        subject: { type: string, nullable: true }
        message: { type: string }
        createdAt: { type: string, format: date-time }
        sender:
          type: object
          properties:
            id: { type: string }
            fullName: { type: string }
            email: { type: string }
