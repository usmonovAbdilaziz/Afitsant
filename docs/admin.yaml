paths:
  # ==================== USER MANAGEMENT ====================
  /api/v1/admin/users:
    get:
      tags: [Admin - Users]
      summary: Get all users
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }

  /api/v1/admin/users/{id}:
    get:
      tags: [Admin - Users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: User data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/User' }

    patch:
      tags: [Admin - Users]
      summary: Update user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                isActive: { type: boolean }
      responses:
        200:
          description: User updated

    delete:
      tags: [Admin - Users]
      summary: Delete user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        204:
          description: User deleted

  /api/v1/admin/users/{userId}/make-admin:
    post:
      tags: [Admin - Users]
      summary: Make user admin
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        200:
          description: User is now admin

  /api/v1/admin/user-management/users/{userId}:
    get:
      tags: [Admin - Users]
      summary: Get user details (advanced)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        200:
          description: User data

  /api/v1/admin/user-management/users/{userId}/role:
    post:
      tags: [Admin - Users]
      summary: Update user role
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [CLIENT, BUSINESS, ADMIN] }
      responses:
        200:
          description: Role updated

  /api/v1/admin/user-management/users/{userId}/disable:
    post:
      tags: [Admin - Users]
      summary: Disable user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        200:
          description: User disabled

  /api/v1/admin/user-management/users/{userId}/enable:
    post:
      tags: [Admin - Users]
      summary: Enable user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        200:
          description: User enabled

